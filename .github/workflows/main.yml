name: CI demo

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Before script - prepare test data
        run: echo "Preparing test data..."

      - name: Script - run tests
        run: echo "Running tests..."

      - name: After script - cleanup temp files
        run: echo "Cleaning up temporary files..."

  build_image:
    runs-on: ubuntu-latest
    needs: run_tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: echo "Building the docker image..."

      - name: Tag docker image
        run: echo "Tagging teh docker image"

  push_image:
    runs-on: ubuntu-latest
    needs: build_image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to docker registry
        run: echo "Logging into docker registry..."

      - name: Push docker image
        run: echo "Pushing docker image to registry..."
