name: CI demo

on:
  push:
    # branches: [ main ]
    branches:
      - '**' # all branches
  pull_request:

jobs:
  run_unit_tests:
    if: github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Before script - prepare test data
        run: echo "Preparing test data..."

      - name: Script - run unit tests
        run: echo "Running unit tests for micro service ${{ vars.MICRO_SERVICE_NAME }} ..."

      - name: After script - cleanup temp files
        run: echo "Cleaning up temporary files..."
          
  run_lint_tests:
    if: github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Before script - prepare test data
        run: echo "Preparing test data..."

      - name: Script - run lint tests
        run: echo "Running lint tests..."

      - name: After script - cleanup temp files
        run: echo "Cleaning up temporary files..."

  build_image:
    if: github.ref == 'refs/heads/main' && (github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes'))
    runs-on: ubuntu-latest
    needs: [run_unit_tests, run_lint_tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: echo "Building the docker image..."

      - name: Tag docker image
        run: echo "Tagging teh docker image"

  push_image:
    if: github.ref == 'refs/heads/main' && (github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes'))
    runs-on: ubuntu-latest
    needs: build_image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to docker registry
        run: echo "Logging into docker registry..."

      - name: Push docker image
        run: echo "Pushing docker image to registry..."

  deploy_image:
    if: github.ref == 'refs/heads/main' && (github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes'))
    runs-on: ubuntu-latest
    needs: push_image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to dev server
        run: echo "Deploying new docker image to dev server ${{ vars.DEPLOYMENT_ENVIRONMENT }}..."
