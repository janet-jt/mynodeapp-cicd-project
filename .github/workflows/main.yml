name: CI demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  run_unit_tests:
    if: github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes')
    runs-on: [self-hosted, local]
    container: node:26-alpine
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if app/node_modules exists and install only if needed
        working-directory: app
        run: |
          echo "Workspace inside container: $PWD"
          if [ -d node_modules ]; then
            echo "node_modules already exists, skipping npm install"
          else
            echo "node_modules not found, running npm install"
            npm install
          fi
    
      - name: Run unit tests
        working-directory: app
        run: |
          echo "Running unit tests for micro service ${{ vars.MICRO_SERVICE_NAME }} ..."
          npm test
          
      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: app/junit.xml

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v6.4.2
        with:
          report_paths: app/junit.xml
          detailed_summary: true
          include_passed: true

  codeql-analyze:
    if: github.event.head_commit == null || !contains(github.event.head_commit.message, 'taking-notes')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # sast:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Run SAST scan
  #       uses: AppThreat/sast-scan-action@master
  #       with:
  #         type: "javascript"  
          
  build_and_push_image:
    needs: run_unit_tests
    runs-on: [self-hosted, local]

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/microservice/${{ vars.MICRO_SERVICE_NAME }}

    steps:
      - name: Fix permissions in workspace
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE
        
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Read version from package.json and set IMAGE_TAG into build.env
        run: |
          IMAGE_VERSION=$(cat app/package.json | jq -r '.version')
          IMAGE_TAG="${IMAGE_VERSION}-${{ github.run_number }}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" > build.env
        
      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          no-cache: true

      - name: Upload build.env artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-env
          path: build.env

  deploy_to_dev:
    needs: build_and_push_image
    uses: ./.github/workflows/deploy.yml
    with:
      runs_on: '["self-hosted","local"]'
      env_name: "development"
      endpoint: ${{ vars.DEV_ENDPOINT }}
      dc_app_port: 3000
      compose_project_name: "dev"
      compose_file_name: "docker-compose-dev.yaml"
    secrets: 
      SSH_HOST: ${{ secrets.DEPLOY_HOST }}
      CONNECT_EC2: ${{ secrets.CONNECT_EC2 }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      
  deploy_to_staging:
    needs: build_and_push_image
    uses: ./.github/workflows/deploy.yml
    with:
      runs_on: '["self-hosted","local"]'
      env_name: "staging"
      endpoint: ${{ vars.STAGING_ENDPOINT }}
      dc_app_port: 4000
      compose_project_name: "staging"
      compose_file_name: "docker-compose-stg.yaml"
    secrets: 
      SSH_HOST: ${{ secrets.STAGING_HOST }}
      CONNECT_EC2: ${{ secrets.CONNECT_EC2 }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
